<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="UTF-8">
<title>CampusNavigator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0b1324] text-white flex items-center justify-center min-h-screen">

<div class="w-full max-w-md bg-[#131b2c] p-8 rounded-xl">

<h1 class="text-3xl text-center mb-6">SYSTEM ACCESS</h1>

<!-- TOGGLE -->
<div class="flex justify-center mb-4">
    <button onclick="showLogin()" class="px-4 py-2 bg-blue-500 rounded-l">Login</button>
    <button onclick="showSignup()" class="px-4 py-2 bg-gray-600 rounded-r">Signup</button>
</div>

<!-- LOGIN -->
<form id="loginForm" class="space-y-4">
    <input id="loginId" placeholder="User ID" class="w-full p-2 bg-black border"/>
    <input id="loginPass" type="password" placeholder="Password" class="w-full p-2 bg-black border"/>

    <button class="w-full bg-blue-500 p-2">Login</button>
</form>

<!-- SIGNUP -->
<form id="signupForm" class="space-y-4 hidden">
    <input id="signupId" placeholder="User ID" class="w-full p-2 bg-black border"/>
    <input id="signupPass" type="password" placeholder="Password" class="w-full p-2 bg-black border"/>

    <button class="w-full bg-green-500 p-2">Create Account</button>
</form>

<!-- ADMIN REQUEST -->
<button onclick="requestAdmin()" class="w-full mt-4 bg-purple-500 p-2">
    Request Admin Access
</button>

<p id="msg" class="text-center mt-3"></p>

</div>

<script>

// TOGGLE
function showLogin(){
    loginForm.classList.remove("hidden");
    signupForm.classList.add("hidden");
}
function showSignup(){
    signupForm.classList.remove("hidden");
    loginForm.classList.add("hidden");
}

// LOGIN
loginForm.addEventListener("submit", async e=>{
    e.preventDefault();

    const userId = loginId.value;
    const password = loginPass.value;

    const res = await fetch("http://localhost:5000/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({userId,password})
    });

    const data = await res.json();

    if(data.success){
        if(data.role==="admin"){
            window.location.href="/admin.html";
        } else {
            window.location.href="/dashboard.html";
        }
    } else {
        msg.innerText="Invalid login";
    }
});

// SIGNUP (USER ONLY)
signupForm.addEventListener("submit", async e=>{
    e.preventDefault();

    const userId = signupId.value;
    const password = signupPass.value;

    const res = await fetch("http://localhost:5000/signup",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({userId,password})
    });

    const data = await res.json();

    msg.innerText = data.message;
});

// ADMIN REQUEST
async function requestAdmin(){
    const userId = prompt("Enter your User ID");

    const res = await fetch("http://localhost:5000/request-admin",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({userId})
    });

    const data = await res.json();
    msg.innerText = data.message;
}

</script>

</body>
</html>
