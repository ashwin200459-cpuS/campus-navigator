
<html><head><link rel='stylesheet' href='../css/style.css'></head>
<body>
<div class='container'>
<div class='card'>
<h2>Forum</h2>
<input id='msg'><button onclick='add()'>Post</button>
<div id='f'></div>
</div>
</div>
<script>
let role=localStorage.getItem('role'),user=localStorage.getItem('user'),data=[];
async function load(){data=await fetch('/forum').then(r=>r.json());render(data);}
function render(arr){
  f.innerHTML = arr.length
  ? arr.map((x,i)=>`
    <div class="card">
      <b>${x.user} (${x.dept}-${x.year}-${x.sec})</b>
      <p>${x.msg}</p>
      ${role==='admin' ? `<button onclick="del(${i})">Delete</button>` : ''}
    </div>
  `).join('')
  : "No posts yet";
}
async function add(){
await fetch('/forum',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({msg:msg.value,user:user})});
load();
}
async function del(i){
await fetch('/forum/'+i,{method:'DELETE',headers:{'role':role}});load();
}
load();
</script></body></html>
