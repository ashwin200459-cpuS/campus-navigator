<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CampusNavigator Dashboard</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body { font-family: 'Inter', sans-serif; background-color: #0b1324; }
.font-headline { font-family: 'Space Grotesk', sans-serif; }
</style>
</head>

<body class="bg-[#0b1324] text-white min-h-screen">

<!-- 🔐 AUTH CHECK -->
<script>
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
    window.location.href = "/login.html";
}
</script>

<!-- TOP BAR -->
<header class="flex justify-between items-center p-6 bg-[#131b2c]">
    <h1 class="text-xl font-bold text-blue-300">CampusNavigator</h1>

    <div class="flex items-center gap-4">
        <span id="topUser" class="text-sm text-gray-300"></span>
        <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Logout</button>
    </div>
</header>

<!-- MAIN -->
<div class="p-8">

    <!-- USER PROFILE -->
    <div class="bg-[#131b2c] p-6 rounded-xl mb-6">
        <h2 id="userName" class="text-2xl font-bold mb-2">User</h2>
        <p id="userIdDisplay" class="text-sm text-blue-300">ID: -</p>
        <p id="userRole" class="text-sm text-green-400 mt-2"></p>
    </div>

    <!-- FEATURES -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        <div class="bg-[#131b2c] p-6 rounded-xl cursor-pointer hover:bg-[#1a2438] transition"
             onclick="goPage('map')">
            <h3 class="text-lg font-bold">Campus Map</h3>
            <p class="text-gray-400 text-sm">Navigate campus</p>
        </div>

        <div class="bg-[#131b2c] p-6 rounded-xl cursor-pointer hover:bg-[#1a2438] transition"
             onclick="goPage('forum')">
            <h3 class="text-lg font-bold">Forum</h3>
            <p class="text-gray-400 text-sm">Discuss with students</p>
        </div>

        <div class="bg-[#131b2c] p-6 rounded-xl cursor-pointer hover:bg-[#1a2438] transition"
             onclick="goPage('notifications')">
            <h3 class="text-lg font-bold">Notifications</h3>
            <p class="text-gray-400 text-sm">Stay updated</p>
        </div>

    </div>

</div>

<script>

// 👤 LOAD USER DATA
document.getElementById("userName").innerText = user.userId;
document.getElementById("userIdDisplay").innerText = "ID: " + user.userId;
document.getElementById("topUser").innerText = user.userId;
document.getElementById("userRole").innerText = "Role: " + user.role;

// 🚪 LOGOUT
function logout(){
    localStorage.removeItem("user");
    window.location.href = "/login.html";
}

// 🔗 PAGE NAVIGATION (AUTO CONNECT SYSTEM)
function goPage(page){

    if(page === "map"){
        window.location.href = "/map.html";
    }
    else if(page === "forum"){
        window.location.href = "/forum.html";
    }
    else if(page === "notifications"){
        window.location.href = "/notifications.html";
    }
}

</script>

</body>
</html>
